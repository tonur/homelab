---
# Tailscale backend target (k3s node's Tailscale IP - find with: tailscale ip -4 on the k3s node)
edge_gateway_backend_ip: "100.117.97.65"  # replace with actual tailscale IP of gigabyte
edge_gateway_tailscale_interface: "tailscale0"

edge_gateway_ingress_ports:
  - 80
  - 443
edge_gateway_game_port_range: "27015-27099"

# HAProxy settings
edge_gateway_mode: proxy
edge_gateway_enable_haproxy: true
edge_gateway_haproxy_maxconn: 2000
edge_gateway_haproxy_timeout_client: 60s
edge_gateway_haproxy_timeout_server: 60s
edge_gateway_haproxy_timeout_connect: 5s
edge_gateway_proxy_backend_http_port: 31080
edge_gateway_proxy_backend_https_port: 31443