{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      securityContext:
        fsGroup: {{ $defaults.pgid }}
        # Explicitly run the pod as the steam user to avoid permission flip-flops
        runAsUser: {{ $defaults.puid | int }}
        runAsGroup: {{ $defaults.pgid | int }}
      initContainers:
      - name: filesystem-reset
        image: busybox
        command:
        - sh
        - -c
        - |
          echo "Nuclear reset of Steam metadata to fix 0x6..."
          # Delete manifest folders that often cause the 0x6 lock
          rm -rf /data/steamapps
          rm -rf /data/temp
          
          echo "Writing launch script..."
          cat > /data/custom_server << 'EOF'
          #!/bin/bash
          # We use xvfb for Unity/Windows headless support
          echo "Starting Windrose..."
          xvfb-run --auto-servernum {{ $config.startCommand }}
          EOF

          echo "Fixing permissions recursively for UID {{ $defaults.puid }}..."
          chmod 755 /data/custom_server
          # Ensure every file/folder (including hidden ones) is owned by our user
          chown -R {{ $defaults.puid }}:{{ $defaults.pgid }} /data
          
          echo "Filesystem ready."
        volumeMounts:
        - name: game-storage
          mountPath: /data
      containers:
      - name: steam-server
        image: {{ $defaults.image }}
        env:
        - name: STEAM_APP_ID
          value: {{ $config.appId | quote }}
        - name: PLATFORM
          value: {{ $config.platform | default $defaults.platform | quote }}
        - name: PUID
          value: {{ $defaults.puid | quote }}
        - name: PGID
          value: {{ $defaults.pgid | quote }}
        # This tells the image to validate files, which helps clear 0x6
        - name: STEAMAPPVALIDATE
          value: "true"
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        volumeMounts:
        - name: game-storage
          mountPath: /data
      volumes:
      - name: game-storage
        persistentVolumeClaim:
          claimName: {{ $name }}-data-pvc
{{- end }}
