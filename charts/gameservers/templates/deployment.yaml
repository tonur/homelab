{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      initContainers:
      - name: init-permissions
        image: busybox
        command:
        - sh
        - -c
        - |
          chown -R {{ $defaults.puid }}:{{ $defaults.pgid }} /data
          # Force remove if it's a directory to prevent cat failure
          if [ -d /data/custom_server ]; then rm -rf /data/custom_server; fi
          
          if [ ! -f /data/custom_server ]; then
            cat > /data/custom_server << 'EOF'
          #!/bin/bash
          # Ensure we have the right permissions to run the binary
          chmod +x /data/server/WindroseServer.exe 2>/dev/null
          su - steam -c "{{ $config.startCommand }}"
          EOF
            chmod 0755 /data/custom_server
            chown {{ $defaults.puid }}:{{ $defaults.pgid }} /data/custom_server
          fi
        volumeMounts:
        - name: game-storage
          mountPath: /data
      containers:
      - name: steam-server
        image: {{ $defaults.image }}
        env:
        - name: STEAM_APP_ID
          value: {{ $config.appId | quote }}
        - name: PLATFORM
          value: {{ $config.platform | default $defaults.platform | quote }}
        - name: PUID
          value: {{ $defaults.puid | quote }}
        - name: PGID
          value: {{ $defaults.pgid | quote }}
        - name: TZ
          value: {{ $defaults.tz | quote }}
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        volumeMounts:
        - name: game-storage
          mountPath: /data
      volumes:
      - name: game-storage
        persistentVolumeClaim:
          claimName: {{ $name }}-data-pvc
{{- end }}