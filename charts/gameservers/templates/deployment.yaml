{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      securityContext:
        fsGroup: {{ $defaults.pgid }}
      initContainers:
      - name: prepare-filesystem
        image: busybox
        command:
        - sh
        - -c
        - |
          echo "Cleaning up potentially corrupt Steam metadata..."
          # Fix for Error 0x6: Wipe the appmetadata/manifests if they exist
          # This forces a clean re-validation of the files
          rm -rf /data/steamapps
          
          echo "Writing launch script..."
          cat > /data/custom_server << 'EOF'
          #!/bin/bash
          echo "------------------------------------------"
          echo "   Launching {{ $name }} via Custom Script"
          echo "------------------------------------------"
          # Run the server with xvfb for virtual display support
          su - steam -c "xvfb-run --auto-servernum {{ $config.startCommand }}"
          EOF

          echo "Fixing permissions recursively..."
          chmod 755 /data/custom_server
          # Ensure user 50520 owns the ENTIRE volume
          chown -R {{ $defaults.puid }}:{{ $defaults.pgid }} /data
          
          echo "Filesystem ready."
        volumeMounts:
        - name: game-storage
          mountPath: /data
      containers:
      - name: steam-server
        image: {{ $defaults.image }}
        env:
        - name: STEAM_APP_ID
          value: {{ $config.appId | quote }}
        - name: PLATFORM
          value: {{ $config.platform | default $defaults.platform | quote }}
        - name: PUID
          value: {{ $defaults.puid | quote }}
        - name: PGID
          value: {{ $defaults.pgid | quote }}
        - name: TZ
          value: {{ $defaults.tz | quote }}
        - name: UPDATE_SERVER
          value: "1"
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        volumeMounts:
        - name: game-storage
          mountPath: /data
      volumes:
      - name: game-storage
        persistentVolumeClaim:
          claimName: {{ $name }}-data-pvc
{{- end }}