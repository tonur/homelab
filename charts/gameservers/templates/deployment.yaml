{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        fsGroup: {{ $defaults.pgid }}
        runAsUser: {{ $defaults.puid | int }}
        runAsGroup: {{ $defaults.pgid | int }}

      initContainers:
      - name: filesystem-prepare
        image: busybox
        securityContext:
          runAsUser: 0 
        command:
        - sh
        - -c
        - |
          echo "Preparing paths and identity..."
          mkdir -p /data/server /data/steam_home /data/etc
          
          # Create a custom passwd file so the user has a name
          echo "root:x:0:0:root:/root:/bin/sh" > /data/etc/passwd
          echo "steam:x:{{ $defaults.puid }}:{{ $defaults.pgid }}:steam:/data/steam_home:/bin/bash" >> /data/etc/passwd
          
          chown -R {{ $defaults.puid }}:{{ $defaults.pgid }} /data
          echo "Filesystem prepare done!"
        volumeMounts:
        - name: game-storage
          mountPath: /data

      - name: steam-updater
        image: {{ $defaults.image }}
        env:
        - name: HOME
          value: "/data/steam_home"
        command: ["/bin/bash", "-c"]
        args:
          - |
            # Verify we can actually write to the target before starting
            touch /data/server/write_test && rm /data/server/write_test || (echo "PERMISSIONS FAIL" && exit 1)

            /usr/games/steamcmd \
              +@sSteamCmdForcePlatformType windows \
              +force_install_dir /data/server \
              +login anonymous \
              +app_update {{ $config.appId | quote }} validate \
              +quit
        volumeMounts:
        - name: game-storage
          mountPath: /data
      containers:
      - name: game-runtime
        image: {{ $defaults.image }}
        env:
        - name: HOME
          value: "/data/steam_home"
        - name: TZ
          value: {{ $defaults.tz | quote }}
        - name: WINEDEBUG
          value: "-all" # Set to "fixme-all,err-all" if you need to debug Wine itself
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        command:
        - bash
        - -c
        - |
          # 1. Manual Xvfb Start
          echo "Initializing Virtual Display..."
          Xvfb :99 -screen 0 1024x768x16 &
          export DISPLAY=:99
          export WINEPREFIX=/data/steam_home/.wine
          
          # 2. Skip Wine's "Install Mono/Gecko" popups which can hang the boot
          export WINEDLLOVERRIDES="mscoree,mshtml="

          # 3. Wait for binary
          until [ -f "/data/server/{{ $config.binary }}" ]; do
            echo "Waiting for binary..."
            sleep 5
          done

          echo "Starting {{ $name }} Dedicated Server..."
          cd /data/server

          # 4. Log Redirection Trick
          # Clear old logs, create a fresh one, and tail it to the container output
          rm -f /data/server/unity_log.txt
          touch /data/server/unity_log.txt
          tail -f /data/server/unity_log.txt &
          
          # 5. Launch with a local log file path
          exec wine "/data/server/{{ $config.binary }}" \
            -batchmode \
            -nographics \
            -logFile "/data/server/unity_log.txt"
        volumeMounts:
        - name: game-storage
          mountPath: /data
      volumes:
      - name: game-storage
        persistentVolumeClaim:
          claimName: {{ $name }}-data-pvc
{{- end }}