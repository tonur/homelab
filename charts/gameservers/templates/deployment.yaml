{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      securityContext:
        fsGroup: {{ $defaults.pgid }}
      initContainers:
      - name: filesystem-reset
        image: busybox
        command:
        - sh
        - -c
        - |
          echo "Resetting Steam metadata to clear 0x6 error..."
          # Force SteamCMD to re-calculate its download state
          rm -rf /data/steamapps
          rm -rf /data/temp
          
          echo "Re-writing launch script..."
          cat > /data/custom_server << 'EOF'
          #!/bin/bash
          echo "--- Starting {{ $name }} ---"
          # su - steam ensures the game runs as the correct user
          # xvfb-run provides the virtual display for the Windows binary
          su - steam -c "xvfb-run --auto-servernum {{ $config.startCommand }}"
          EOF

          echo "Fixing permissions recursively for UID {{ $defaults.puid }}..."
          chmod 755 /data/custom_server
          # Ensure every file/folder is owned by the steam user (50520)
          chown -R {{ $defaults.puid }}:{{ $defaults.pgid }} /data
          
          echo "Filesystem ready."
        volumeMounts:
        - name: game-storage
          mountPath: /data
      containers:
      - name: steam-server
        image: {{ $defaults.image }}
        env:
        - name: STEAM_APP_ID
          value: {{ $config.appId | quote }}
        - name: PLATFORM
          value: {{ $config.platform | default $defaults.platform | quote }}
        - name: PUID
          value: {{ $defaults.puid | quote }}
        - name: PGID
          value: {{ $defaults.pgid | quote }}
        - name: TZ
          value: {{ $defaults.tz | quote }}
        - name: STEAMAPPVALIDATE
          value: "true"
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        volumeMounts:
        - name: game-storage
          mountPath: /data
      volumes:
      - name: game-storage
        persistentVolumeClaim:
          claimName: {{ $name }}-data-pvc
{{- end }}
