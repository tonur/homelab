{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      securityContext:
        fsGroup: {{ $defaults.pgid }}
      initContainers:
      - name: create-launch-script
        image: busybox
        command:
        - sh
        - -c
        - |
          # 1. Create the custom_server file on the writable PVC
          cat > /data/custom_server << 'EOF'
          #!/bin/bash
          echo "------------------------------------------"
          echo "   Launching {{ $name }} via Custom Script"
          echo "------------------------------------------"
          
          # Dropping privileges to 'steam' and using xvfb for the virtual display
          # We use the startCommand defined in values.yaml
          su - steam -c "xvfb-run --auto-servernum {{ $config.startCommand }}"
          EOF

          # 2. Set the exact permissions the main container expects
          chmod 755 /data/custom_server
          chown {{ $defaults.puid }}:{{ $defaults.pgid }} /data/custom_server
          
          echo "Launch script created successfully at /data/custom_server"
        volumeMounts:
        - name: game-storage
          mountPath: /data
      containers:
      - name: steam-server
        image: {{ $defaults.image }}
        env:
        - name: STEAM_APP_ID
          value: {{ $config.appId | quote }}
        - name: PLATFORM
          value: {{ $config.platform | default $defaults.platform | quote }}
        - name: PUID
          value: {{ $defaults.puid | quote }}
        - name: PGID
          value: {{ $defaults.pgid | quote }}
        - name: TZ
          value: {{ $defaults.tz | quote }}
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        volumeMounts:
        - name: game-storage
          mountPath: /data
      volumes:
      - name: game-storage
        persistentVolumeClaim:
          claimName: {{ $name }}-data-pvc
{{- end }}