{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      securityContext:
        fsGroup: {{ $defaults.pgid }}
        runAsUser: {{ $defaults.puid }}
        runAsGroup: {{ $defaults.pgid }}
      containers:
      - name: steam-server
        image: {{ $defaults.image }}
        command: ["/bin/bash", "-c"]
        args:
          - |
            # 1. Update/Install
            /entrypoint.sh & 
            UPDATE_PID=$!
            wait $UPDATE_PID

            # 2. Safety Check
            echo "Waiting for binary..."
            until [ -f "/data/{{ $config.binaryPath }}" ]; do
              sleep 5
            done

            # 3. Launch
            echo "Starting server..."
            {{ $config.startCommand }}
        env:
        - name: STEAM_APP_ID
          value: {{ $config.appId | quote }}
        - name: PLATFORM
          value: {{ $config.platform | default $defaults.platform | quote }}
        - name: PUID
          value: {{ $defaults.puid | quote }}
        - name: PGID
          value: {{ $defaults.pgid | quote }}
        - name: TZ
          value: {{ $defaults.tz | quote }}
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        volumeMounts:
        - name: game-storage
          mountPath: /data
      volumes:
      - name: game-storage
        persistentVolumeClaim:
          claimName: {{ $name }}-data-pvc
{{- end }}