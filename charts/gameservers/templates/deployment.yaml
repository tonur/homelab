{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        fsGroup: {{ $defaults.pgid }}
        runAsUser: {{ $defaults.puid | int }}
        runAsGroup: {{ $defaults.pgid | int }}

      initContainers:
      - name: filesystem-prepare
        image: busybox
        securityContext:
          runAsUser: 0 
        command:
        - sh
        - -c
        - |
          echo "Cleaning up and preparing writable paths..."
          mkdir -p /data/server /data/steam_home
          
          # Force a clean manifest state to fix the 0x6 error
          # We remove the metadata but KEEP the actual game data if it exists
          rm -rf /data/steam_home/*
          rm -rf /data/server/steamapps/downloading/*
          rm -rf /data/server/steamapps/temp/*
          # Remove specifically the manifest for this app to force a re-check
          rm -f /data/server/steamapps/appmanifest_{{ $config.appId }}.acf
          
          chown -R {{ $defaults.puid }}:{{ $defaults.pgid }} /data

          # Create a fragment of a passwd file
          echo "steam:x:{{ $defaults.puid }}:{{ $defaults.pgid }}:steam:/data/steam_home:/bin/bash" > /data/passwd_fragment
          echo "Ready."
        volumeMounts:
        - name: game-storage
          mountPath: /data

      - name: steam-updater
        image: {{ $defaults.image }}
        env:
        - name: HOME
          value: "/data/steam_home"
        command: ["/bin/bash", "-c"]
        args:
          - |
            # Verify we can actually write to the target before starting
            touch /data/server/write_test && rm /data/server/write_test || (echo "PERMISSIONS FAIL" && exit 1)

            /usr/games/steamcmd \
              +@sSteamCmdForcePlatformType windows \
              +force_install_dir /data/server \
              +login anonymous \
              +app_update {{ $config.appId | quote }} validate \
              +quit
        volumeMounts:
        - name: game-storage
          mountPath: /data
      containers:
      - name: game-runtime
        image: {{ $defaults.image }}
        env:
        - name: HOME
          value: "/data/steam_home"
        - name: TZ
          value: {{ $defaults.tz | quote }}
        - name: WINEDEBUG
          value: "-all" # Set to "fixme-all,err-all" if you need to debug Wine itself
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        command:
        - bash
        - -c
        - |
          # 1. Identity Setup (Optional: helps some apps that check for a username)
          export USER=steam
          export LOGNAME=steam
          
          # 2. Manual Xvfb Start (More reliable than xvfb-run for logging)
          echo "Initializing Virtual Display..."
          Xvfb :99 -screen 0 1024x768x16 &
          export DISPLAY=:99
          sleep 2

          # 3. Wait for binary
          until [ -f "/data/server/{{ $config.binary }}" ]; do
            echo "Waiting for binary..."
            sleep 5
          done

          echo "Starting {{ $name }} Dedicated Server..."
          cd /data/server
          
          # 4. The Launch with Console Logs
          # -batchmode -nographics: Essential for headless Unity servers
          # -logFile /dev/stdout: Force logs to show up in 'kubectl logs'
          exec wine64 "/data/server/{{ $config.binary }}" \
            -batchmode \
            -nographics \
            -logFile /dev/stdout
{{- end }}