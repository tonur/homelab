{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      securityContext:
        fsGroup: {{ $defaults.pgid }}
        runAsUser: {{ $defaults.puid | int }}
        runAsGroup: {{ $defaults.pgid | int }}

      initContainers:
      - name: filesystem-prepare
        image: busybox
        securityContext:
          runAsUser: 0 
        command:
        - sh
        - -c
        - |
          echo "Preparing persistent structure..."
          mkdir -p /data/server /data/steam_home
          chown -R {{ $defaults.puid }}:{{ $defaults.pgid }} /data
        volumeMounts:
        - name: game-storage
          mountPath: /data

      - name: steam-updater
        image: {{ $defaults.image }}
        env:
        - name: HOME
          value: "/data/steam_home"
        command: ["/bin/bash", "-c"]
        args:
          - |
            # 1. Wait for the network to actually be 'up' and DNS to resolve
            echo "Waiting for network and Steam DNS..."
            until timeout 2 bash -c "cat < /dev/null > /dev/tcp/google.com/443" 2>/dev/null; do
              echo "Network not ready, sleeping 2s..."
              sleep 2
            done
            
            echo "Network is up. Verifying Steam connectivity..."
            # Try to resolve a Steam CM just to be sure
            until getent hosts cm01-dk.steampowered.com; do
              echo "Waiting for Steam DNS resolution..."
              sleep 2
            done

            # 2. Run SteamCMD with explicit platform override and validation
            # We use the full path to avoid any ambiguity
            /usr/games/steamcmd \
              +@sSteamCmdForcePlatformType windows \
              +force_install_dir /data/server \
              +login anonymous \
              +app_update {{ $config.appId | quote }} validate \
              +quit
        volumeMounts:
        - name: game-storage
          mountPath: /data

      containers:
      - name: game-runtime
        image: {{ $defaults.image }}
        env:
        - name: HOME
          value: "/data/steam_home"
        - name: TZ
          value: {{ $defaults.tz | quote }}
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        command:
        - bash
        - -c
        - |
          echo "Starting {{ $name }} Dedicated Server..."
          exec xvfb-run --auto-servernum {{ $config.startCommand }}
        volumeMounts:
        - name: game-storage
          mountPath: /data
      volumes:
      - name: game-storage
        persistentVolumeClaim:
          claimName: {{ $name }}-data-pvc
{{- end }}
