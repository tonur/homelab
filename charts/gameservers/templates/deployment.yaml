{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-launch-script
data:
  custom_server: |
    #!/bin/bash
    echo "--- Starting Custom Launch Script ---"
    
    su - steam -c "xvfb-run --auto-servernum {{ $config.startCommand }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      securityContext:
        fsGroup: {{ $defaults.pgid }}
      containers:
      - name: steam-server
        image: {{ $defaults.image }}
        env:
        - name: STEAM_APP_ID
          value: {{ $config.appId | quote }}
        - name: PLATFORM
          value: {{ $config.platform | default $defaults.platform | quote }}
        - name: PUID
          value: {{ $defaults.puid | quote }}
        - name: PGID
          value: {{ $defaults.pgid | quote }}
        - name: TZ
          value: {{ $defaults.tz | quote }}
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        volumeMounts:
        - name: game-storage
          mountPath: /data
        - name: script-volume
          # see https://github.com/GamePackets/docker-steam-server#custom-server
          mountPath: /data/custom_server
          subPath: custom_server
      volumes:
      - name: game-storage
        persistentVolumeClaim:
          claimName: {{ $name }}-data-pvc
      - name: script-volume
        configMap:
          name: {{ $name }}-launch-script
          defaultMode: 0755
{{- end }}