{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      # This fixes the DNS subdomain resolution (the wget www.google.com failure)
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        fsGroup: {{ $defaults.pgid }}
        runAsUser: {{ $defaults.puid | int }}
        runAsGroup: {{ $defaults.pgid | int }}

      initContainers:
      - name: filesystem-prepare
        image: busybox
        securityContext:
          runAsUser: 0 
        command:
        - sh
        - -c
        - |
          echo "Setting up writable paths..."
          mkdir -p /data/server /data/steam_home
          chown -R {{ $defaults.puid }}:{{ $defaults.pgid }} /data
        volumeMounts:
        - name: game-storage
          mountPath: /data

      - name: steam-updater
        image: {{ $defaults.image }}
        env:
        - name: HOME
          value: "/data/steam_home"
        command: ["/bin/bash", "-c"]
        args:
          - |
            # 1. Simple network check using built-in bash features (no extra tools needed)
            echo "Checking internet access..."
            until timeout 1 bash -c "cat < /dev/null > /dev/tcp/8.8.8.8/53" 2>/dev/null; do
              echo "Waiting for gateway..."
              sleep 2
            done

            # 2. Find the steamcmd binary dynamically
            STEAMCMD_BIN=$(which steamcmd || echo "/usr/games/steamcmd")
            echo "Using SteamCMD at: $STEAMCMD_BIN"

            # 3. Run the update
            $STEAMCMD_BIN \
              +@sSteamCmdForcePlatformType windows \
              +force_install_dir /data/server \
              +login anonymous \
              +app_update {{ $config.appId | quote }} validate \
              +quit
        volumeMounts:
        - name: game-storage
          mountPath: /data

      containers:
      - name: game-runtime
        image: {{ $defaults.image }}
        env:
        - name: HOME
          value: "/data/steam_home"
        - name: TZ
          value: {{ $defaults.tz | quote }}
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        command:
        - bash
        - -c
        - |
          echo "Starting {{ $name }}..."
          # Running the actual launch command
          exec xvfb-run --auto-servernum {{ $config.startCommand }}
        volumeMounts:
        - name: game-storage
          mountPath: /data
      volumes:
      - name: game-storage
        persistentVolumeClaim:
          claimName: {{ $name }}-data-pvc
{{- end }}
