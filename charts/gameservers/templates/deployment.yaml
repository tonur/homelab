{{- $defaults := .Values.defaults -}}
{{- range $name, $config := .Values.servers }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
    spec:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      securityContext:
        fsGroup: {{ $defaults.pgid }}
        runAsUser: {{ $defaults.puid | int }}
        runAsGroup: {{ $defaults.pgid | int }}

      initContainers:
      - name: filesystem-prepare
        image: busybox
        securityContext:
          runAsUser: 0 
        command:
        - sh
        - -c
        - |
          echo "Cleaning up and preparing writable paths..."
          mkdir -p /data/server /data/steam_home
          
          # Force a clean manifest state to fix the 0x6 error
          # We remove the metadata but KEEP the actual game data if it exists
          rm -rf /data/steam_home/*
          rm -rf /data/server/steamapps/downloading/*
          rm -rf /data/server/steamapps/temp/*
          # Remove specifically the manifest for this app to force a re-check
          rm -f /data/server/steamapps/appmanifest_{{ $config.appId }}.acf
          
          chown -R {{ $defaults.puid }}:{{ $defaults.pgid }} /data
          echo "Ready."
        volumeMounts:
        - name: game-storage
          mountPath: /data

      - name: steam-updater
        image: {{ $defaults.image }}
        env:
        - name: HOME
          value: "/data/steam_home"
        command: ["/bin/bash", "-c"]
        args:
          - |
            # Verify we can actually write to the target before starting
            touch /data/server/write_test && rm /data/server/write_test || (echo "PERMISSIONS FAIL" && exit 1)

            /usr/games/steamcmd \
              +@sSteamCmdForcePlatformType windows \
              +force_install_dir /data/server \
              +login anonymous \
              +app_update {{ $config.appId | quote }} validate \
              +quit
        volumeMounts:
        - name: game-storage
          mountPath: /data

      containers:
      - name: game-runtime
        image: {{ $defaults.image }}
        env:
        - name: HOME
          value: "/data/steam_home"
        - name: TZ
          value: {{ $defaults.tz | quote }}
        # Wine often needs a "fake" X server for these Windows builds
        - name: DISPLAY
          value: ":99"
        {{- range $config.extraEnvs }}
        - name: {{ .name }}
          value: {{ .value | quote }}
        {{- end }}
        command:
        - bash
        - -c
        - |
          # 1. Wait until the binary actually exists
          echo "Waiting for binary at /data/server/{{ $config.binary }}..."
          until [ -f "/data/server/{{ $config.binary }}" ]; do
            sleep 5
          done

          echo "Starting {{ $name }}..."
          # 2. Change directory to the server folder so Wine/Unity find relative assets
          cd /data/server
          
          # 3. Launch via xvfb. (Removed the trailing " that caused the crash)
          exec xvfb-run --auto-servernum wine /data/server/{{ $config.binary }}
        volumeMounts:
        - name: game-storage
          mountPath: /data
{{- end }}