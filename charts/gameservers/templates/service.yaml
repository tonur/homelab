{{- range $name, $config := .Values.servers }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-svc
spec:
  type: NodePort
  selector:
    app: {{ $name }}
  ports:
    - name: game-udp
      protocol: UDP
      port: {{ $config.port }}
      targetPort: 27015
      nodePort: {{ $config.port }}
    - name: game-tcp
      protocol: TCP
      port: {{ $config.port }}
      targetPort: 27015
      nodePort: {{ $config.port }}
{{- end }}