{{- range $name, $config := .Values.servers }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-svc
spec:
  type: NodePort
  selector:
    app: {{ $name }}
  ports:
  {{- range $config.ports }}
    - name: game-udp
      protocol: UDP
      port: {{ .port }}
      nodePort: {{ .port }}
      targetPort: {{ .targetPort }}
    - name: game-tcp
      protocol: TCP
      port: {{ .port }}
      nodePort: {{ .port }}
      targetPort: {{ .targetPort }}
  {{- end }}
{{- end }}