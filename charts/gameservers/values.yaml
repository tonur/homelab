defaults:
  platform: "linux"
  publicIP: 198.55.102.244
  image: thetestgame/steam:stable
  tz: "Europe/Copenhagen"
  puid: "50520"
  pgid: "50520"
  storageClass: "local-path"
  storageSize: "20Gi"

servers:
  windrose:
    platform: "windows"
    appId: "4129620"
    ports:
      - port: 27015
        targetPort: 7777
    binaryPath: "/data/server/R5/Binaries/Win64/WindroseServer-Win64-Shipping.exe"
    binaryFlags: "-server -log -unattended -NoUI -port=7777 -QueryPort=27015 -DirectConnection"
    extraEnvs:
      - name: WINEDLLOVERRIDES
        value: "mscoree,mshtml="
      - name: CURL_IPRESOLVE
        value: "v4"
    debugCommands: |
      tail -F /data/server/R5/Saved/Logs/*.log &
    configInjections:
      - secretName: "windrose-json-config"
        files:
          - source: "ServerDescription.json"
            destination: "/data/server/R5/ServerDescription.json"
        secretData:
          # We template the entire JSON file here
          ServerDescription.json: |
            {
              "Version": 1,
              "DeploymentId": "0.10.0.4.268-9d2ca277",
              "ServerDescription_Persistent": {
                "PersistentServerId": "288F0FDE426E0671BDF607818598539F",
                "InviteCode": "d952dcb5",
                "IsPasswordProtected": {{ if .password }}true{{ else }}false{{ end }},
                "Password": {{ .password | quote }},
                "ServerName": "Tonur",
                "WorldIslandId": "EFCDC157DF1B41DA57AC438F20ACF099",
                "MaxPlayerCount": 8,
                "UserSelectedRegion": "",
                "P2pProxyAddress": "127.0.0.1",
                "UseDirectConnection": true,
                "DirectConnectionServerAddress": "198.55.102.244",
                "DirectConnectionServerPort": 27015,
                "DirectConnectionProxyAddress": "0.0.0.0"
              }
            }