defaults:
  platform: "linux"
  publicIP: 198.55.102.244
  image: thetestgame/steam:stable
  tz: "Europe/Copenhagen"
  puid: "50520"
  pgid: "50520"
  storageClass: "local-path"
  storageSize: "20Gi"

servers:
  windrose:
    platform: "windows"
    appId: "4129620"
    ports:
      - port: 27015
        targetPort: 7777
    binary: "WindroseServer.exe"
    extraEnvs:
      - name: USE_DIRECT_CONNECTION
        value: "true"
    debugCommands: |
      # Unreal Engine Logging Setup
      mkdir -p /data/server/R5/Saved/Logs
      touch /data/server/R5/Saved/Logs/WindroseServer.log
      tail -F /data/server/R5/Saved/Logs/*.log &