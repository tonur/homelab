apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nanobot-assistant
  namespace: apps
spec:
  interval: 5m
  chart:
    spec:
      chart: ./charts/nanobot-assistant
      version: "*"
      sourceRef:
        kind: GitRepository
        name: homelab
        namespace: default
      interval: 1m
      reconcileStrategy: Revision
  install:
    remediation:
      retries: 3
    createNamespace: true
  upgrade:
    force: true
    remediation:
      retries: 3