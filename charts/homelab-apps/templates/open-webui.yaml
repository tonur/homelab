{{- if .Values.openWebUI.enabled }}
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: open-webui
  namespace: apps
spec:
  interval: 24h
  url: https://open-webui.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: apps
spec:
  interval: 5m
  chart:
    spec:
      chart: open-webui
      version: "14.4.0"
      sourceRef:
        kind: HelmRepository
        name: open-webui
        namespace: apps
      interval: 1m
      reconcileStrategy: Revision
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  values:
    ollama:
      enabled: false
    ingress:
      enabled: true
      class: "traefik"
      host: "open-webui.kragh.dev"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
{{- end }}
