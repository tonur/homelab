---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: external-dns
  namespace: infrastructure
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/external-dns/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: infrastructure
spec:
  interval: 15m
  releaseName: external-dns
  targetNamespace: external-dns
  install:
    createNamespace: true
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
  chart:
    spec:
      chart: external-dns
      version: "1.20.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: infrastructure
  values:
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/michelangelomo/external-dns-desec-provider
          tag: latest
        env:
          - name: WEBHOOK_APITOKEN
            valueFrom:
              secretKeyRef:
                name: desec-token
                key: token
          - name: WEBHOOK_DOMAINFILTERS
            value: "kragh.dev"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
