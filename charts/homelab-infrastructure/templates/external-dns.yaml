---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: external-dns
  namespace: infrastructure
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/external-dns/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: infrastructure
spec:
  interval: 15m
  releaseName: external-dns
  targetNamespace: external-dns
  chart:
    spec:
      chart: external-dns
      version: "1.20.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: infrastructure
  install:
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
  dependsOn:
    - name: infrastructure-external-dns-config
      namespace: infrastructure
    - name: infrastructure-cluster-secret-store
      namespace: infrastructure
  values:
    sources:
      - crd
      - service
      - ingress
    domainFilters:
      - kragh.dev
    excludeDomains:
      - kube.pirate-acrux.ts.net
    managedRecordTypes:
      - A
      - AAAA
      - CNAME
      - TXT
      - MX
    policy: sync
    provider:
      name: webhook
      webhook:
        image:
          repository: docker.io/hetzner/external-dns-hetzner-webhook
          tag: v0.3.3
        env:
          - name: HETZNER_TOKEN
            valueFrom:
              secretKeyRef:
                name: hetzner-token
                key: token
          - name: USE_CLOUD_API
            value: "true"
          - name: BULK_MODE
            value: "true"
