---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: external-dns
  namespace: infrastructure
spec:
  interval: 24h
  url: https://kubernetes-sigs.github.io/external-dns/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: infrastructure
spec:
  interval: 15m
  releaseName: external-dns
  targetNamespace: external-dns
  chart:
    spec:
      chart: external-dns
      version: "1.20.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: infrastructure
  install:
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
  dependsOn:
    - name: infrastructure-external-dns-config
      namespace: infrastructure
    - name: infrastructure-cluster-secret-store
      namespace: infrastructure
  values:
    sources:
      - crd
      - service
      - ingress
    domainFilters:
      - kragh.dev
    domainFilters:
      - kube.pirate-acrux.ts.net
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/michelangelomo/external-dns-desec-provider
          tag: latest
        env:
          - name: WEBHOOK_APITOKEN
            valueFrom:
              secretKeyRef:
                name: desec-token
                key: token
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
