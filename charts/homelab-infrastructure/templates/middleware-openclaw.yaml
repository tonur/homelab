apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: openclaw-oidc
  namespace: traefik
spec:
  oidc:
    provider:
      url: https://<TENANT>.zitadel.cloud/.well-known/openid-configuration
      clientId: 357873147879470828
    redirectUrl: https://oidc.kragh.dev/oauth2/callback
    postLogoutRedirect: https://oidc.kragh.dev/logout
    scopes: openid profile email
    cookie:
      name: openclaw-auth
      secure: true
