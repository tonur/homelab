---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-proxy-auth
  namespace: infrastructure
spec:
  forwardAuth:
    address: http://oauth2-proxy.infrastructure.svc.cluster.local:4180
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Preferred-Username
      - Authorization
