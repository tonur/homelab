---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: oauth2-proxy
  namespace: infrastructure
spec:
  interval: 24h
  url: https://oauth2-proxy.github.io/manifests
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: oauth2-proxy
  namespace: infrastructure
spec:
  interval: 15m
  releaseName: oauth2-proxy
  targetNamespace: infrastructure
  chart:
    spec:
      chart: oauth2-proxy
      version: "7.18.0" 
      sourceRef:
        kind: HelmRepository
        name: oauth2-proxy
        namespace: infrastructure
  install:
    createNamespace: true
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  values:
    # https://github.com/oauth2-proxy/manifests/blob/main/helm/oauth2-proxy/values.yaml
    config:
      clientID: "357890574222860083"
      configFile: |-
        provider = "oidc"
        
        # Zitadel OIDC Configuration
        oidc_issuer_url = "https://homelab-wzcnuv.us1.zitadel.cloud"

        # Cookie configuration
        cookie_domains = ".kragh.dev"
        cookie_secure = true
        cookie_httponly = true


        redirect_url = "https://oauth2-proxy.kragh.dev/oauth2/callback"
        whitelist_domains = ".kragh.dev"
        upstreams = ["file:///dev/null"]
        
        # Important: these settings enable proper redirects
        pass_access_token = true
        set_xauthrequest = true
        set_authorization_header = true
        skip_auth_strip_headers = false

        # Email validation
        email_domains = ["*"]
    
    # Use existing secret created by sops
    existingSecret: oauth2-proxy-secrets
    existingSecretPerKey: false
    
    ingress:
      enabled: true
      className: traefik
      path: /
      pathType: Prefix
      hosts:
        - oidc.kragh.dev
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        traefik.ingress.kubernetes.io/router.middlewares: infrastructure-oauth2-proxy-auth@kubernetescrd
      tls:
        - secretName: oidc-kragh-dev-tls
          hosts:
            - oidc.kragh.dev
