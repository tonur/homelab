---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: mogenius
  namespace: infrastructure
spec:
  interval: 24h
  url: https://helm.mogenius.com/public
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
  namespace: infrastructure
spec:
  interval: 5m
  chart:
    spec:
      chart: renovate-operator
      version: "4.7.1"
      sourceRef:
        kind: HelmRepository
        name: mogenius
        namespace: infrastructure
      interval: 1m
      reconcileStrategy: Revision
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
