---
apiVersion: renovate-operator.mogenius.com/v1alpha1
kind: RenovateJob
metadata:
  name: homelab-updates
  namespace: infrastructure
spec:
  image: renovate/renovate:37.340
  schedule: "47 21 * * *"
  parallelism: 1 
  provider:
    name: "forgejo" 
    endpoint: "https://codeberg.org/api/v1"

  extraEnv:
    - name: RENOVATE_TOKEN
      valueFrom:
        secretKeyRef:
          name: renovate-secrets
          key: RENOVATE_TOKEN
    - name: RENOVATE_AUTODISCOVER
      value: "true"
    - name: RENOVATE_AUTODISCOVER_FILTER
      value: "tonur/*"

  # This uses the default /tmp mount as defined in your CRD's default properties
  scratchVolume:
    enabled: true
    path: "/tmp"
