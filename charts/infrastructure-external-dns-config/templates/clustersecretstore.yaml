---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: infisical
spec:
  provider:
    infisical:
      hostAPI: https://eu.infisical.com
      auth:
        universalAuthCredentials:
          clientId:
            namespace: default
            name: infisical-universal-auth-credentials
            key: clientId
          clientSecret:
            namespace: default
            name: infisical-universal-auth-credentials
            key: clientSecret
      secretsScope:
        projectSlug: homelab
        environmentSlug: live