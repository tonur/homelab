---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: json-resume-npm-tools
  namespace: json-resume
  labels:
    app.kubernetes.io/name: json-resume
    app.kubernetes.io/component: storage
spec:
  volumeName: json-resume-npm-tools-pvc
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi