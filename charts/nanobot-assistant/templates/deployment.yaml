apiVersion: apps/v1
kind: Deployment
metadata:
  name: nanobot-assistant
  namespace: apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nanobot-assistant
  template:
    metadata:
      labels:
        app: nanobot-assistant
    spec:
      containers:
        - name: nanobot
          image: ghcr.io/hkuds/nanobot:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 18790
          command: ["nanobot", "gateway"]
          env:
            - name: NANOBOT_HOME
              value: /root/.nanobot
          volumeMounts:
            - name: config
              mountPath: /root/.nanobot
            - name: workspace
              mountPath: /workspace
      volumes:
        - name: config
          secret:
            secretName: nanobot-secrets
        - name: workspace
          persistentVolumeClaim:
            claimName: nanobot-workspace