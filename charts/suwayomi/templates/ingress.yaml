---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: suwayomi
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
    - host: opds.kragh.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: suwayomi
                port:
                  number: 80
  tls:
    - hosts:
        - opds.kragh.dev
      secretName: suwayomi-tls
